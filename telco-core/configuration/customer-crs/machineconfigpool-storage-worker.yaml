apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfigPool
metadata:
  labels:
    machineconfiguration.openshift.io/role: storage-worker-mcp
  name: storage-worker-mcp
spec:
  machineConfigSelector:
    matchExpressions:
    - key: machineconfiguration.openshift.io/role
      operator: In
      values:
      - storage-worker-mcp
      - worker
  # example 100% storage nodes unavailable during deployment
  maxUnavailable: 100%
  nodeSelector:
    matchLabels:
      node-role.kubernetes.io/storage-worker-mcp: ""