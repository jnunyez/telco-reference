apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfigPool
metadata:
  labels:
    machineconfiguration.openshift.io/role: workload-worker
  name: workload-worker-mcp
spec:
  machineConfigSelector:
    matchExpressions:
    - key: machineconfiguration.openshift.io/role
      operator: In
      values:
      - workload-worker-mcp
      - worker
  # installation paused
  # installation will be done at the end of ZTP
  paused: true
  # increase speed of installation
  maxUnavailable: 100%
  nodeSelector:
    matchLabels:
      node-role.kubernetes.io/workload-worker-mcp: ""